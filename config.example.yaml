# Example user config. Copy to config.yaml and fill in.
#
#   cp config.example.yaml config.yaml
#
# config.yaml is gitignored. Anything you set here overrides defaults.yaml
# and the active preset. CLI flags (--dry-run, --sample-size) override this.
#
# Multiple targets? Keep multiple files and pick at run time:
#   python -m newsporter --preset <name> --config configs/staging.yaml
#   python -m newsporter --preset <name> --config configs/prod.yaml
# (The CLI's auto-pickup only looks at ./config.yaml. With --config <path>
# you can name them anything. Add `configs/` to .gitignore if you do this.)

# ── Target WordPress site ────────────────────────────────────────────
# This is the single most important block. The whole point of newsporter
# is to upload posts to this site.
wordpress:
  url: "https://your-site.example.com"
  username: ""              # WP username
  app_password: ""          # WP Application Password (wp-admin/profile.php)

# Number of rows to pull from the source. No safe default; must be set
# here or via --sample-size on the CLI.
dataset:
  sample_size: 100

# LLM overrides. The defaults.yaml already wires gpt-4o-mini against
# OpenAI's API using $OPENAI_API_KEY. Uncomment to point at a local
# server or any other OpenAI-compatible endpoint.
#
# llm:
#   base_url: "http://127.0.0.1:1234/v1"   # e.g. local LM Studio
#   api_key: "not-needed"
#   model: "google/gemma-3-12b"
#
# Any OpenAI-compatible endpoint works. If your provider needs custom
# headers (e.g. a tracking feature flag), set them under `headers:`:
#
# llm:
#   base_url: "https://your-proxy.example.com/v1"
#   api_key: "${YOUR_PROXY_TOKEN}"
#   model: "your-model-name"
#   headers:
#     X-Your-Custom-Header: "value"

# Per-run load overrides. Defaults are sensible (concurrency 4, retry 3,
# dry_run true, create_wp_users true). Uncomment to override.
#
# load:
#   concurrency: 2
